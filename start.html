<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Datenagi">
    <meta name="keywords" content="Simple Powerful Beautiful startpage for browser">
    <meta name="description" content="A startpage for browser.Are you tired of the default page?Just use this">
</head>
<style>
        /* 全局样式 - 可随意修改 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1e2b3a 0%, #0f1a26 100%);
            color: #ffffff;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 700px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin: 0 0 0.5rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            background-clip:text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.7;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-input {
            width: 100%;
            padding: 1.2rem 1.8rem;
            font-size: 1.3rem;
            border: none;
            border-radius: 60px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            color: #1e2b3a;
            box-sizing: border-box;
        }
        .search-input:focus {
            box-shadow: 0 10px 30px rgba(0, 120, 255, 0.5);
            transform: scale(1.02);
            background: #ffffff;
        }
        .search-btn {
            margin-top: 1.5rem;
            padding: 0.9rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: #2d5f9e;
            color: white;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .search-btn:hover {
            background: #1e4a7a;
        }
        .search-btn:active {
            transform: scale(0.98);
        }
        footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你的起始页</h1>
        <div class="sub">使用 Bing 搜索，直接回车</div>

        <!-- 搜索表单：提交到 Bing 搜索引擎 -->
        <form action="https://www.bing.com/search" method="GET" target="_blank">
            <input type="text" name="q" class="search-input" placeholder="搜索或输入网址..." autofocus>
            <button type="submit" class="search-btn">Bing 一下</button>
        </form>

        <footer>✨ 自定义样式 · 回车即搜 ✨</footer>
    </div>
</body>
</html>
</html>
